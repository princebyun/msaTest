<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Service 화면</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        h1 { margin-bottom: 16px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        input { padding: 8px; margin: 4px 8px 4px 0; }
        button { padding: 8px 12px; margin-right: 8px; cursor: pointer; }
        table { border-collapse: collapse; width: 100%; margin-top: 8px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f5f5f5; }
        .row-actions button { padding: 6px 10px; }
    </style>
</head>
<body>
<h1>사용자 관리 화면 (User Service)</h1>

<div class="card">
    <h3>사용자 등록</h3>
    <label for="name">이름</label>
    <input id="name" placeholder="홍길동" type="text">
    <label for="email">이메일</label>
    <input id="email" placeholder="hong@test.com" type="email">
    <button onclick="createUser()">등록</button>
</div>

<div class="card">
    <h3>사용자 목록</h3>
    <button onclick="loadUsers()">새로고침</button>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>이름</th>
            <th>이메일</th>
            <th>기능</th>
        </tr>
        </thead>
        <tbody id="userTableBody"></tbody>
    </table>
</div>

<script th:inline="javascript">
    const userApi = '/users';

    async function loadUsers() {
        const response = await fetch(userApi);
        const users = await response.json();
        const tbody = document.getElementById('userTableBody');
        tbody.innerHTML = '';

        users.forEach(user => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${user.id}</td>
                <td><input id="name-${user.id}" value="${user.name}" /></td>
                <td><input id="email-${user.id}" value="${user.email}" /></td>
                <td class="row-actions">
                    <button onclick="updateUser(${user.id})">수정</button>
                    <button onclick="deleteUser(${user.id})">삭제</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    async function createUser() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;

        const response = await fetch(userApi, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email })
        });

        if (!response.ok) {
            alert('등록 실패');
            return;
        }

        document.getElementById('name').value = '';
        document.getElementById('email').value = '';
        await loadUsers();
    }

    async function updateUser(id) {
        const name = document.getElementById(`name-${id}`).value;
        const email = document.getElementById(`email-${id}`).value;

        const response = await fetch(`${userApi}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email })
        });

        if (!response.ok) {
            alert('수정 실패');
            return;
        }
        await loadUsers();
    }

    async function deleteUser(id) {
        const response = await fetch(`${userApi}/${id}`, { method: 'DELETE' });
        if (!response.ok) {
            alert('삭제 실패');
            return;
        }
        await loadUsers();
    }

    loadUsers();
</script>
</body>
</html>
