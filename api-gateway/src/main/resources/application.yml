server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/users/**
        - id: user-ui
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/user-ui/**
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/orders/**
        - id: order-ui
          uri: ${ORDER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/order-ui/**

management:
  endpoints:
    web:
      exposure:
        include: health,info
